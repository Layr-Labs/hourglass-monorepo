grpcPort: {{envDefault "EXECUTOR_PORT" "9090"}}
performerNetworkName: "{{envDefault "PERFORMER_NETWORK_NAME" "hgctl-performer-network"}}"

operator:
  address: "{{env "OPERATOR_ADDRESS"}}"
  {{if env "OPERATOR_PRIVATE_KEY"}}
  operatorPrivateKey:
    privateKey: "{{env "OPERATOR_PRIVATE_KEY"}}"
  {{end}}
  signingKeys:
    {{if not (isTrue "USE_WEB3_SIGNER_BLS")}}
    bls:
      keystoreFile: "/keystores/operator.bls.keystore.json"
      password: "{{env "BLS_KEYSTORE_PASSWORD"}}"
    {{else}}
    bls:
      remoteSigner: true
      remoteSignerConfig:
        url: "{{env "WEB3_SIGNER_BLS_URL"}}"
        fromAddress: "{{env "WEB3_SIGNER_BLS_FROM_ADDRESS"}}"
        publicKey: "{{env "WEB3_SIGNER_BLS_PUBLIC_KEY"}}"
        {{if env "WEB3_SIGNER_BLS_CA_CERT"}}
        caCert: "/keystores/web3signer-bls-ca.crt"
        {{end}}
        {{if env "WEB3_SIGNER_BLS_CLIENT_CERT"}}
        cert: "/keystores/web3signer-bls-client.crt"
        key: "/keystores/web3signer-bls-client.key"
        {{end}}
    {{end}}
    {{if or (env "ECDSA_PRIVATE_KEY") (isTrue "USE_WEB3_SIGNER_ECDSA")}}
    ecdsa:
      {{if isTrue "USE_WEB3_SIGNER_ECDSA"}}
      remoteSigner: true
      remoteSignerConfig:
        url: "{{env "WEB3_SIGNER_ECDSA_URL"}}"
        fromAddress: "{{env "WEB3_SIGNER_ECDSA_FROM_ADDRESS"}}"
        publicKey: "{{env "WEB3_SIGNER_ECDSA_PUBLIC_KEY"}}"
        {{if env "WEB3_SIGNER_ECDSA_CA_CERT"}}
        caCert: "/keystores/web3signer-ecdsa-ca.crt"
        {{end}}
        {{if env "WEB3_SIGNER_ECDSA_CLIENT_CERT"}}
        cert: "/keystores/web3signer-ecdsa-client.crt"
        key: "/keystores/web3signer-ecdsa-client.key"
        {{end}}
      {{else if env "ECDSA_PRIVATE_KEY"}}
      privateKey: "{{env "ECDSA_PRIVATE_KEY"}}"
      {{end}}
    {{end}}

l1Chain:
  chainId: "{{env "L1_CHAIN_ID"}}"
  rpcUrl: "{{env "L1_RPC_URL"}}"

avsPerformers:
  - image:
      repository: "{{env "PERFORMER_REGISTRY"}}"
      tag: "{{envDefault "PERFORMER_TAG" "latest"}}"
    processType: "{{envDefault "PERFORMER_PROCESS_TYPE" "server"}}"
    avsAddress: "{{env "AVS_ADDRESS"}}"
    workerCount: {{envDefault "WORKER_COUNT" "1"}}
    signingCurve: "{{envDefault "SIGNING_CURVE" "bn254"}}"
    {{if env "AVS_REGISTRAR_ADDRESS"}}
    avsRegistrarAddress: "{{env "AVS_REGISTRAR_ADDRESS"}}"
    {{end}}

{{if env "TASK_MAILBOX_L2_ADDRESS"}}
overrideContracts:
  taskMailbox:
    chainIds: [{{env "L1_CHAIN_ID"}}]
    contract: |
      {
        "name": "TaskMailbox",
        "address": "{{env "TASK_MAILBOX_L2_ADDRESS"}}",
        "chainId": {{envDefault "L2_CHAIN_ID" "8453"}}
      }
{{end}}
debug: {{envDefault "DEBUG" "false"}}

serverConfig:
  port: {{envDefault "AGGREGATOR_PORT" "9000"}}
  secureConnection: {{envDefault "SECURE_CONNECTION" "false"}}
  aggregatorUrl: "{{envDefault "AGGREGATOR_URL" "aggregator:9000"}}"

operator:
  address: "{{env "OPERATOR_ADDRESS"}}"
  {{if env "OPERATOR_PRIVATE_KEY"}}
  operatorPrivateKey: "{{env "OPERATOR_PRIVATE_KEY"}}"
  {{end}}
  signingKeys:
    {{if not (isTrue "USE_WEB3_SIGNER_BLS")}}
    bls:
      keystoreFile: "/keystores/operator.bls.keystore.json"
      password: "{{env "BLS_KEYSTORE_PASSWORD"}}"
    {{else}}
    bls:
      remoteSigner: true
      remoteSignerConfig:
        url: "{{env "WEB3_SIGNER_BLS_URL"}}"
        fromAddress: "{{env "WEB3_SIGNER_BLS_FROM_ADDRESS"}}"
        publicKey: "{{env "WEB3_SIGNER_BLS_PUBLIC_KEY"}}"
        {{if env "WEB3_SIGNER_BLS_CA_CERT"}}
        caCert: "/keystores/web3signer-bls-ca.crt"
        {{end}}
        {{if env "WEB3_SIGNER_BLS_CLIENT_CERT"}}
        cert: "/keystores/web3signer-bls-client.crt"
        key: "/keystores/web3signer-bls-client.key"
        {{end}}
    {{end}}

l1ChainId: {{env "L1_CHAIN_ID"}}

chains:
  - name: "{{envDefault "L1_NETWORK_NAME" "ethereum"}}"
    network: "{{envDefault "L1_NETWORK" "mainnet"}}"
    chainId: {{env "L1_CHAIN_ID"}}
    rpcUrl: "{{env "L1_RPC_URL"}}"
    pollIntervalSeconds: {{envDefault "L1_POLL_INTERVAL" "2"}}
  {{if env "L2_CHAIN_ID"}}
  - name: "{{envDefault "L2_NETWORK_NAME" "base"}}"
    network: "{{envDefault "L2_NETWORK" "mainnet"}}"
    chainId: {{env "L2_CHAIN_ID"}}
    rpcUrl: "{{env "L2_RPC_URL"}}"
    pollIntervalSeconds: {{envDefault "L2_POLL_INTERVAL" "2"}}
  {{end}}

avss:
  - address: "{{env "AVS_ADDRESS"}}"
    responseTimeout: {{envDefault "RESPONSE_TIMEOUT" "3000"}}
    chainIds:
      - {{env "L1_CHAIN_ID"}}
      {{if env "L2_CHAIN_ID"}}
      - {{env "L2_CHAIN_ID"}}
      {{end}}
    {{if env "AVS_REGISTRAR_ADDRESS"}}
    avsRegistrarAddress: "{{env "AVS_REGISTRAR_ADDRESS"}}"
    {{end}}

{{if env "TASK_MAILBOX_L1_ADDRESS"}}
overrideContracts:
  taskMailbox:
    chainIds:
      - {{env "L1_CHAIN_ID"}}
      {{if env "L2_CHAIN_ID"}}
      - {{env "L2_CHAIN_ID"}}
      {{end}}
    contract: |
      {
        "name": "TaskMailbox",
        "address": "{{env "TASK_MAILBOX_L1_ADDRESS"}}",
        "chainId": {{env "L1_CHAIN_ID"}}
      }
{{end}}